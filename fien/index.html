<!DOCTYPE html>
<html lang="en">
<head>
<script src="../supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  window._sbAuthClient = createClient(window.SB_URL, window.SB_KEY);
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAJARAH · Admin</title>
<link rel="icon" type="image/png" id="adminIcon" href="../admin_favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --surface2: #151515;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
    --muted2: #333;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --accent-glow: rgba(200,255,0,0.15);
    --red: #ff4444;
    --orange: #ff9500;
    --green: #00e676;
    --radius: 8px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-display); min-height:100vh; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  /* ── LOGIN ── */
  #loginScreen {
    position:fixed; inset:0; background:var(--bg); z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(200,255,0,0.06) 0%, transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(200,255,0,0.025) 0%, transparent 50%);
  }
  .login-box {
    width:90%; max-width:400px; padding:52px 32px 44px;
    background: rgba(15,15,15,0.85);
    border:1px solid rgba(200,255,0,0.12);
    border-radius:16px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(200,255,0,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    animation: loginReveal 0.55s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }
  @keyframes loginReveal { from{opacity:0;transform:translateY(24px) scale(0.96)} to{opacity:1;transform:none} }
  .login-logo {
    font-size:9px; letter-spacing:5px; text-transform:uppercase;
    color:var(--accent); margin-bottom:6px; font-family:var(--font-mono);
    opacity: 0.7;
  }
  .login-title {
    font-size:28px; font-weight:800; color:var(--text); margin-bottom:8px; letter-spacing:1px;
    font-family: 'Cinzel', serif;
  }
  .login-subtitle {
    font-size:11px; color:var(--muted); letter-spacing:1.5px; margin-bottom:36px;
    text-transform:uppercase; font-family:var(--font-mono);
  }
  .login-box input {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border2);
    border-radius:var(--radius); padding:14px 16px; color:var(--text);
    font-family:var(--font-mono); font-size:14px; margin-bottom:12px;
    transition:border-color .2s, box-shadow .2s;
  }
  .login-box input:focus {
    outline:none; border-color:var(--accent);
    box-shadow: 0 0 0 3px rgba(200,255,0,0.08);
  }
  .login-box input::placeholder { color:var(--muted); }
  .login-btn {
    width:100%; padding:14px; background:var(--accent); color:#080808;
    border:none; border-radius:var(--radius); font-family:var(--font-display);
    font-size:12px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;
    cursor:pointer; transition:all .2s cubic-bezier(0.16,1,0.3,1); margin-top:8px;
    box-shadow: 0 4px 20px rgba(200,255,0,0.2);
  }
  .login-btn:hover { opacity:.9; transform:translateY(-1px); box-shadow: 0 8px 28px rgba(200,255,0,0.3); }
  .login-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .login-err { font-size:11px; color:var(--red); margin-top:14px; letter-spacing:1px; display:none; text-align:center; }

  /* ── SETUP BANNER ── */
  #setupBanner {
    background:linear-gradient(135deg,#1a1a00,#0f0f0f);
    border:1px solid #3a3a00; border-radius:var(--radius);
    padding:20px 24px; margin-bottom:24px; display:none;
  }
  #setupBanner h3 { font-size:13px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
  #setupBanner p { font-size:12px; color:#888; line-height:1.9; }
  #setupBanner code { background:#1e1e00; color:var(--accent); padding:2px 6px; border-radius:3px; font-family:var(--font-mono); font-size:11px; }
  .setup-fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .setup-fields input {
    background:var(--surface2); border:1px solid #3a3a00; border-radius:var(--radius);
    padding:10px 14px; color:var(--text); font-family:var(--font-mono); font-size:12px;
    transition:border-color .2s; width:100%;
  }
  .setup-fields input:focus { outline:none; border-color:var(--accent); }
  .setup-fields input::placeholder { color:#555; }
  .setup-save-btn {
    margin-top:10px; padding:10px 22px; background:var(--accent); color:#080808;
    border:none; border-radius:var(--radius); font-family:var(--font-display);
    font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer;
  }

  /* ── LAYOUT ── */
  #app { display:none; }
  .shell { display:grid; grid-template-columns:230px 1fr; min-height:100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    background:var(--surface); border-right:1px solid var(--border);
    padding:28px 0; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .sb-logo { padding:0 20px 28px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .sb-logo-text {
    font-size:16px; font-weight:800; letter-spacing:4px; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .sb-logo-text::before {
    content: '';
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--accent); box-shadow: 0 0 8px var(--accent);
    flex-shrink:0;
  }
  .sb-logo-sub { font-size:9px; color:var(--muted2); letter-spacing:3px; text-transform:uppercase; margin-top:4px; padding-left:14px; }
  .sb-section { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); padding:0 20px 8px; margin-top:14px; }
  .sb-item {
    display:flex; align-items:center; gap:11px; padding:11px 20px;
    font-size:12.5px; color:var(--muted); cursor:pointer;
    transition:color .18s, background .18s, border-color .18s, box-shadow .18s;
    border-left:2px solid transparent; letter-spacing:.5px;
    position:relative;
  }
  .sb-item:hover { color:var(--text); background:rgba(255,255,255,0.03); }
  .sb-item.active {
    color:var(--accent); background:var(--accent-dim);
    border-left-color:var(--accent);
    box-shadow: inset 0 0 20px rgba(200,255,0,0.03);
  }
  .sb-item .icon { font-size:15px; width:18px; text-align:center; }
  .sb-badge { margin-left:auto; background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:2px 7px; border-radius:20px; font-family:var(--font-mono); }
  .sb-bottom { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); }
  .sb-logout {
    font-size:11px; color:var(--muted); cursor:pointer; letter-spacing:1px;
    text-transform:uppercase; transition:all .2s; background:none; border:none;
    font-family:var(--font-display); padding:8px 12px; border-radius:var(--radius);
    width:100%; text-align:left;
  }
  .sb-logout:hover { color:var(--red); background:rgba(255,68,68,0.06); }

  /* ── MAIN CONTENT ── */
  .main { padding:36px 40px; overflow-y:auto; }
  .page { display:none; }
  .page.active { display:block; animation:tabSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes tabSlideUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:none; }
  }

  .page-header {
    margin-bottom:32px;
    padding-bottom:20px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .page-header h1 { font-family: 'Cinzel', serif !important; font-size:26px; font-weight:800; letter-spacing:1px; }
  .page-header p { font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.5px; }
  .page-header-sync {
    font-size:10px; color:var(--muted2); letter-spacing:1px; font-family:var(--font-mono);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }

  /* ── STAT CARDS ── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:22px 20px;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease, border-color 0.4s;
    cursor:default; position:relative; overflow:hidden;
  }
  .stat-card::after {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 100% 0%, rgba(200,255,0,0.03) 0%, transparent 60%);
    pointer-events:none;
  }
  .stat-card:hover {
    transform: translateY(-5px);
    border-color: rgba(200,255,0,0.25);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,255,0,0.08);
  }
  .stat-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .stat-val { font-size:30px; font-weight:800; color:var(--text); font-family:var(--font-mono); transition: color 0.3s; }
  .stat-sub { font-size:10px; color:var(--muted2); margin-top:8px; letter-spacing:.5px; }
  .stat-accent { border-top:2px solid var(--accent); }
  .stat-accent .stat-val { color: var(--accent); }
  .stat-accent:hover { box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 30px rgba(200,255,0,0.06); }

  /* ── TABLE ── */
  .table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .table-top { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .table-top h2 { font-size:14px; font-weight:700; letter-spacing:1px; }
  .tbl { width:100%; border-collapse:collapse; }
  .tbl th { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted2); padding:12px 18px; text-align:left; background:var(--bg); border-bottom:1px solid var(--border); font-weight:700; }
  .tbl td { padding:14px 18px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .tbl tr:last-child td { border-bottom:none; }
  .tbl tr:hover td { background:rgba(255,255,255,0.02); transition: background 0.15s; }
  .tbl .mono { font-family:var(--font-mono); font-size:12px; color:var(--muted); }

  /* ── BADGES ── */
  .badge-pill { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:20px; font-family:var(--font-mono); }
  .badge-green { background:rgba(0,230,118,.1); color:var(--green); border:1px solid rgba(0,230,118,.2); }
  .badge-orange { background:rgba(255,149,0,.1); color:var(--orange); border:1px solid rgba(255,149,0,.2); }
  .badge-red { background:rgba(255,68,68,.1); color:var(--red); border:1px solid rgba(255,68,68,.2); }
  .badge-purple { background:rgba(186,104,200,.1); color:#ba68c8; border:1px solid rgba(186,104,200,.2); }
  .badge-muted { background:var(--surface2); color:var(--muted); border:1px solid var(--border2); }

  /* ── BUTTONS ── */
  .btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius); font-family:var(--font-display); font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border:none; transition:all .2s cubic-bezier(0.16,1,0.3,1); }
  .btn-accent { background:var(--accent); color:#080808; }
  .btn-accent:hover { opacity:.85; transform:translateY(-1px); box-shadow:0 4px 12px rgba(200,255,0,0.2); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border2); }
  .btn-ghost:hover { color:var(--text); background:var(--surface2); transform:translateY(-1px); }
  .btn-danger { background:rgba(255,68,68,.1); color:var(--red); border:1px solid rgba(255,68,68,.2); }
  .btn-danger:hover { background:rgba(255,68,68,.2); transform:translateY(-1px); }
  .btn-sm { padding:6px 12px; font-size:10px; }

  /* ── SEARCH/FILTER BAR ── */
  .search-bar {
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:9px 14px; color:var(--text);
    font-family:var(--font-mono); font-size:12px; width:220px; transition:border-color .2s;
  }
  .search-bar:focus { outline:none; border-color:var(--accent); }
  .search-bar::placeholder { color:var(--muted); }

  /* ── MODAL ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(6px); z-index:5000; overflow-y:auto; padding:20px 0; box-sizing:border-box; }
  .modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; animation:fadeIn .2s ease; }
  .modal-overlay.open .modal { animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal { background:var(--surface); border:1px solid var(--border2); border-radius:10px; width:92%; max-width:560px; padding:36px; position:relative; margin:auto; }
  .modal h2 { font-family: 'Cinzel', serif !important; font-size:18px; font-weight:800; margin-bottom:6px; letter-spacing:.5px; }
  .modal-sub { font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:28px; }
  .modal-x { position:absolute; top:16px; right:18px; background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; transition:color .2s; }
  .modal-x:hover { color:var(--text); }

  /* ── FORM FIELDS ── */
  .field-group { margin-bottom:18px; }
  .field-group label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; font-weight:600; }
  .field-group input, .field-group textarea, .field-group select {
    width:100%; background:var(--surface2); border:1px solid var(--border2);
    border-radius:var(--radius); padding:11px 14px; color:var(--text);
    font-family:var(--font-mono); font-size:13px;
    transition:border-color .2s, box-shadow .2s;
  }
  .field-group input:focus, .field-group textarea:focus, .field-group select:focus {
    outline:none; border-color:var(--accent);
    box-shadow: 0 0 0 3px rgba(200,255,0,0.06);
  }
  .field-group textarea { resize:vertical; min-height:90px; line-height:1.7; }
  .field-group select option { background:var(--surface2); }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .field-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

  /* ── INVENTORY GRID ── */
  .inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
  .inv-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
  }
  .inv-card-top { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .inv-card-title { font-size:14px; font-weight:700; letter-spacing:.5px; }
  .inv-card-body { padding:16px 20px; }
  .size-inv-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); }
  .size-inv-row:last-child { border-bottom:none; }
  .size-lbl { font-size:12px; font-weight:700; letter-spacing:2px; min-width:30px; }
  .size-stock-input {
    width:70px; background:var(--surface2); border:1px solid var(--border2);
    border-radius:4px; padding:6px 10px; color:var(--text);
    font-family:var(--font-mono); font-size:13px; text-align:center; transition:border-color .2s;
  }
  .size-stock-input:focus { outline:none; border-color:var(--accent); }

  /* ── SHIPPING SETTINGS ── */
  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .settings-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:26px; }
  .settings-card h3 { font-size:13px; font-weight:700; letter-spacing:1px; margin-bottom:18px; text-transform:uppercase; }
  .zone-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
  .zone-row:last-child { border-bottom:none; }
  .zone-name { font-size:13px; color:var(--text); }
  .zone-price-input {
    width:110px; background:var(--surface2); border:1px solid var(--border2);
    border-radius:4px; padding:7px 12px; color:var(--text);
    font-family:var(--font-mono); font-size:13px; text-align:right; transition:border-color .2s;
  }
  .zone-price-input:focus { outline:none; border-color:var(--accent); }

  /* ── ORDER STATUS FILTER ── */
  .filter-tabs { display:flex; gap:4px; margin-bottom:20px; }
  .filter-tab { padding:7px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; transition:all .2s; font-family:var(--font-display); font-weight:600; }
  .filter-tab.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(200,255,0,.3); }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:28px; right:28px;
    background: rgba(15,15,15,0.95); border:1px solid rgba(200,255,0,0.3);
    border-radius:var(--radius); padding:14px 22px; font-size:11px;
    color:var(--accent); letter-spacing:1.5px; z-index:9999;
    transform:translateY(80px); opacity:0;
    transition:all .35s cubic-bezier(.16,1,.3,1); pointer-events:none;
    backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    max-width:320px;
  }
  #toast.show { transform:translateY(0); opacity:1; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .e-icon { font-size:36px; margin-bottom:14px; }
  .empty-state p { font-size:13px; letter-spacing:.5px; }

  /* ── LOADING ── */
  .loading-row td { text-align:center; color:var(--muted); font-size:12px; letter-spacing:2px; padding:40px !important; }

  /* ── MOBILE NAVIGATION ── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.06);
    z-index: 999;
    grid-template-columns: repeat(6, 1fr);
    padding: 6px 4px;
    padding-bottom: calc(6px + env(safe-area-inset-bottom));
    gap: 2px;
  }
  .m-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 6px 4px;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    gap: 4px;
    transition: color 0.2s, transform 0.2s;
    border-radius: 10px;
    position: relative;
  }
  .m-nav-item:active { transform: scale(0.92); }
  .m-nav-item span {
    font-size: 7.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: var(--font-display);
    font-weight: 700;
    transition: color 0.2s;
  }
  .m-nav-item.active {
    color: var(--accent);
  }
  .m-nav-item.active::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(200,255,0,0.5);
  }

  /* ── LAST SYNCED INDICATOR ── */
  .sync-status {
    font-size: 10px; color: var(--muted2); letter-spacing: 1px;
    padding: 6px 16px 10px; font-family: var(--font-mono);
    display: flex; align-items: center; gap: 6px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SIMULATOR MOCKUP ── */
  .sim-phone-wrapper {
    position: relative;
    width: 375px;
    height: 680px;
    background: #000;
    border: 12px solid #1c1c1c;
    border-radius: 40px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
    margin: auto;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .sim-phone-wrapper.landscape {
    width: 680px;
    height: 375px;
    border-radius: 40px;
  }
  /* Status bar details */
  .sim-status-bar {
    height: 24px;
    background: #000;
    color: #888;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-family: var(--font-mono);
    user-select: none;
    position: relative;
  }
  .sim-speaker {
    width: 50px;
    height: 4px;
    background: #222;
    border-radius: 2px;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }
  .sim-iframe {
    width: 100%;
    flex: 1;
    border: none;
    background: #050505;
  }
  /* Simulator header controls */
  .sim-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 12px 20px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    flex-wrap: wrap;
    width: 100%;
  }
  .sim-control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sim-control-group label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .sim-btn-active {
    background: var(--accent) !important;
    color: #080808 !important;
  }
  .order-address-box span:hover {
    color: var(--accent);
  }

  /* ── MOBILE RESPONSIVENESS OVERRIDES ── */
  @media(max-width:900px) {
    .shell { grid-template-columns:1fr; padding-bottom: 90px; }
    .sidebar { display:none; }
    .mobile-nav { display: grid; }
    .charts-row { grid-template-columns: 1fr !important; }
    .settings-grid { grid-template-columns: 1fr !important; gap: 14px; }
    .settings-card { grid-column: auto !important; }
    .main { padding: 20px 14px; }
    .page-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
      flex-direction: column;
      align-items: flex-start;
    }
    .page-header h1 { font-size: 22px; }
    .page-header-sync { display: none; }

    /* Toast to top-center on mobile */
    #toast {
      bottom: auto;
      top: 16px;
      right: 50%;
      transform: translateX(50%) translateY(-80px);
      font-size: 11px;
      max-width: calc(100vw - 32px);
    }
    #toast.show {
      transform: translateX(50%) translateY(0);
    }

    /* Reposition card/table headers on mobile */
    .table-top {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 12px !important;
      padding: 16px 14px !important;
    }
    .table-top > div {
      flex-direction: column !important;
      align-items: stretch !important;
      width: 100% !important;
      gap: 8px !important;
    }
    .table-top .search-bar {
      width: 100% !important;
      margin: 0 !important;
    }
    .table-top .btn {
      width: 100% !important;
      justify-content: center !important;
    }

    /* Transform tables to clean card lists on mobile */
    .tbl thead { display: none; }
    .tbl, .tbl tbody, .tbl tr, .tbl td { display: block; width: 100%; }
    .tbl tr {
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    /* First cell (ID/number) styled as card header */
    .tbl tr td:first-child {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 12px 14px;
    }
    .tbl td {
      text-align: right;
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 44px;
      font-size: 13px;
    }
    .tbl td:last-child { border-bottom: none; padding-top: 12px; padding-bottom: 12px; }
    .tbl td::before {
      content: attr(data-label);
      font-weight: 700;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: left;
      flex-shrink: 0;
      margin-right: 8px;
    }
    .tbl td .order-address-box {
      margin-top: 0 !important;
      max-width: 65% !important;
    }
    .tbl td .btn { font-size: 10px; padding: 6px 10px; }
    .tbl td:last-child .btn { width: 100%; justify-content: center; margin: 2px 0; }
    .filter-tabs { flex-wrap: wrap; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .filter-tab { padding: 6px 12px; font-size: 10px; white-space: nowrap; }
    .field-row, .field-row-3 { grid-template-columns: 1fr; gap: 12px; }
    .inv-grid { grid-template-columns: 1fr; gap: 14px; }

    /* Auto-zoom prevention on iOS */
    .field-group input, .field-group select, .field-group textarea, .login-box input {
      font-size: 16px !important;
    }
  }

  @media(max-width: 900px) and (orientation: portrait) {
    /* 2x2 grid for stats so they all fit on mobile screens without scrolling */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      padding: 14px 12px;
    }
    .stat-label {
      font-size: 8px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .stat-val {
      font-size: 20px;
    }
    .stat-sub {
      font-size: 9px;
      margin-top: 2px;

  }

  @media(max-width: 900px) and (orientation: landscape) {
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      padding: 14px 12px;
    }
    .stat-label {
      font-size: 8px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .stat-val {
      font-size: 20px;
    }
  }
</style>

// Returns the best available auth token: user JWT if logged in, anon key as fallback
async function getAuthToken() {
  if (window._sbAuthClient) {
    try {
      const { data: { session } } = await window._sbAuthClient.auth.getSession();
      if (session && session.access_token) return session.access_token;
    } catch(e) {}
  }
  return SB_KEY;
}

async function sbFetch(table, method='GET', body=null, filters='', id=null) {
  if (!SB_URL || !SB_KEY) return null;

  // Clean trailing slashes and construct url
  let baseUrl = SB_URL.replace(/\/+$/, "");
  let url = `${baseUrl}/rest/v1/${table}`;

  if (id) {
    url += `?id=eq.${id}`;
  } else if (filters) {
    url += filters;
  }

  const opts = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json'
    }
  };

  if (method === 'POST' || method === 'PATCH') {
    opts.headers['Prefer'] = 'return=representation';
  }

  if (body) opts.body = JSON.stringify(body);

  try {
    const res = await fetch(url, opts);
    if (!res.ok) {
      const errText = await res.text();
      console.error(`Supabase API Error (${res.status}):`, errText);
      return null;
    }
    return await res.json();
  } catch (e) {
    console.error("Database communication down:", e);
    return null;
  }
}

// --- COOKIE HELPERS & SESSION CONTROL ---
function setCookie(name, value, days) {
  let expires = "";
  if (days) {
    let date = new Date();
    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
    expires = "; expires=" + date.toUTCString();
  }
  document.cookie = name + "=" + (value || "")  + expires + "; path=/";
}

function getCookie(name) {
  let nameEQ = name + "=";
  let ca = document.cookie.split(';');
  for(let i=0; i < ca.length; i++) {
    let c = ca[i];
    while (c.charAt(0)==' ') c = c.substring(1,c.length);
    if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
  }
  return null;
}

function eraseCookie(name) {   
  document.cookie = name +'=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
}

// --- GREEN FAVICON TINT FILTER ---
function applyGreenIcon() {
  const img = new Image();
  img.src = 'majarah.jpg';
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    
    try {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        // Convert to grayscale and apply green-tint filter
        const val = (r + g + b) / 3;
        data[i] = val * 0.15;     // Reduce Red
        data[i+1] = val * 1.6;    // Boost Green
        data[i+2] = val * 0.15;   // Reduce Blue
      }
      ctx.putImageData(imgData, 0, 0);
      
      let link = document.getElementById('adminIcon');
      if (!link) {
        link = document.createElement('link');
        link.rel = 'icon';
        link.id = 'adminIcon';
        document.head.appendChild(link);
      }
      link.href = canvas.toDataURL("image/png");
    } catch(e) {
      console.error("Failed to process green icon via canvas:", e);
    }
  };
}

  if (e.key !== 'Escape') return;

async function doLogin() {
  const email = document.getElementById('loginUser').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  // Wait for Supabase auth client to be ready (module load may be async)
  let attempts = 0;
  while (!window._sbAuthClient && attempts++ < 20) {
    await new Promise(r => setTimeout(r, 100));
  }

  if (!window._sbAuthClient) {
    errEl.textContent = 'Auth service not ready. Refresh and try again.';
    errEl.style.display = 'block';
    btn.textContent = 'Enter Dashboard';
    btn.disabled = false;
    return;
  }

  const { error } = await window._sbAuthClient.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'Enter Dashboard';
  btn.disabled = false;
  if (error) {
    errEl.textContent = error.message || 'Invalid credentials. Try again.';
    errEl.style.display = 'block';
  } else {
    showDashboard();
  }
}

async function logout() {
  if (window._sbAuthClient) await window._sbAuthClient.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginUser').value = '';
  stopAutoSync();
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initSupabase();
  syncDashboardData();
  startAutoSync();
  requestNotificationPermission();
}

// Auto-login on load/refresh if Supabase session exists
window.addEventListener('DOMContentLoaded', async () => {
  applyGreenIcon();

  // Wait for the Supabase auth module to finish loading
  let attempts = 0;
  while (!window._sbAuthClient && attempts++ < 30) {
    await new Promise(r => setTimeout(r, 100));
  }

  if (window._sbAuthClient) {
    const { data: { session } } = await window._sbAuthClient.auth.getSession();
    if (session) {
      showDashboard();
      return;
    }
  }

  // No active session — show login screen
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function syncDashboardData(isBackground = false) {
  console.log("Syncing database tables...");
  
  // 1. Fetch live tables from Supabase
  const orders = await sbFetch('orders', 'GET', null, '?select=*&order=id.desc');
  const products = await sbFetch('products', 'GET', null, '?select=*&order=name.asc');
  const inventory = await sbFetch('inventory', 'GET', null, '?select=*');
  
  const previousOrders = [...storeOrders];
  
  if (orders) storeOrders = orders;
  if (products) storeProducts = products;
  if (inventory) storeInventory = inventory;
  
  // Update last synced time
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const syncEl = document.getElementById('sidebarSyncTime');
  if (syncEl) syncEl.textContent = `Synced ${timeStr}`;
  const headerSyncEl = document.getElementById('headerSyncTime');
  if (headerSyncEl) headerSyncEl.textContent = `Synced ${timeStr}`;

  // Update pending order badge on sidebar & mobile nav
  const pendingCount = storeOrders.filter(o => o.status === 'pending').length;
  const badge = document.getElementById('newOrdersBadge');
  const mobileBadge = document.getElementById('mobileOrdersBadge');
  if (badge) { badge.textContent = pendingCount; badge.style.display = pendingCount > 0 ? '' : 'none'; }
  if (mobileBadge) { mobileBadge.textContent = pendingCount; mobileBadge.style.display = pendingCount > 0 ? '' : 'none'; }

  // 2. Render UI Components
  renderOverviewCounters();
  renderRecentOrdersTable();
  renderOrdersTable(storeOrders);
  renderProductsTable();
  renderInventoryGrid();
  renderAnalyticsCharts(storeOrders);
  
  // 3. Play notification sound if there are new orders or updates
  if (isBackground && previousOrders.length > 0 && orders) {
    let hasNewNotifications = false;
    let notificationMessage = "";
    
    for (const o of orders) {
      const prev = previousOrders.find(p => String(p.id) === String(o.id));
      if (!prev) {
        hasNewNotifications = true;
        notificationMessage = `New order #${o.id} received from ${o.first_name || ''} ${o.last_name || ''}!`;
        break;
      } else if (prev.status !== o.status) {
        if (o.status === 'refund_requested') {
          hasNewNotifications = true;
          notificationMessage = `Refund requested for order #${o.id}!`;
          break;
        } else if (o.status === 'pending') {
          hasNewNotifications = true;
          notificationMessage = `Order #${o.id} status changed to pending!`;
          break;
        }
      }
    }
    
    if (hasNewNotifications) {
      playNotificationSound();
      flashTitle(notificationMessage);
      showSystemNotification("MAJARAH Admin Notification", notificationMessage);
      showToast(notificationMessage);
    }
  }
}

function renderOverviewCounters() {
  const animateCount = (el, target, prefix = '', suffix = '') => {
    if (!el) return;
    const start = 0;
    const duration = 600;
    const startTime = performance.now();
    const isFloat = String(target).includes('.');
    const update = (now) => {
      const elapsed = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - elapsed, 3); // ease-out cubic
      const current = start + (target - start) * eased;
      el.textContent = prefix + (isFloat ? current.toFixed(0) : Math.round(current)) + suffix;
      if (elapsed < 1) requestAnimationFrame(update);
    };
    requestAnimationFrame(update);
  };

  const totalOrders = storeOrders.length;
  const rev = storeOrders
    .filter(o => o.status !== 'cancelled')
    .reduce((sum, o) => sum + (Number(o.subtotal) || 0), 0);
  const pending = storeOrders.filter(o => o.status === 'pending').length;
  const units = storeOrders.filter(o => o.status !== 'cancelled').length;

  animateCount(document.getElementById('statOrders'),  totalOrders);
  animateCount(document.getElementById('statRevenue'), rev, '', ' EGP');
  animateCount(document.getElementById('statPending'), pending);
  animateCount(document.getElementById('statUnits'),   units);
}

function getStatusColor(status) {
  if (status === 'pending') return 'orange';
  if (status === 'refund_requested') return 'orange';
  if (status === 'confirmed' || status === 'delivered' || status === 'shipped') return 'green';
  if (status === 'cancelled') return 'red';
  if (status === 'refunded') return 'purple';
  if (status === 'refund_denied') return 'muted';
  return 'muted';
}

// --- WHATSAPP CONFIRMATION & BULK CSV EXPORT OPERATIONS ---
function formatWhatsAppPhone(phone) {
  let clean = String(phone).replace(/[^0-9]/g, '');
  if (clean.startsWith('01')) {
    clean = '2' + clean;
  } else if (clean.startsWith('1')) {
    clean = '20' + clean;
  } else if (!clean.startsWith('20') && clean.length === 11) {
    clean = '2' + clean;
  }
  return clean;
}

function sendWhatsAppConfirmation(orderId) {
  const o = storeOrders.find(order => String(order.id) === String(orderId));
  if (!o) return;
  
  const phone = formatWhatsAppPhone(o.phone);
  const total = (Number(o.subtotal)||0) + (Number(o.shipping_cost)||0);
  
  const addressParts = o.address ? o.address.split(' | ') : [o.address || '—'];
  const street = addressParts[0] || '—';
  const city = o.city || '—';
  const fullAddressStr = city + ' - ' + street;
  
  const message = `يا هلا بيك في مجرة! 🌌\n\nحابين نأكد معاك طلبك رقم #${o.id} لقطعة:\n👕 ${o.product_name} (مقاس ${o.size || '—'})\n\n📍 العنوان: ${fullAddressStr}\n💰 الحساب الكلي: ${total} جنيه (شامل الشحن)\n\nيرجى الرد بـ *تأكيد* لتجهيز وشحن طلبك في أسرع وقت! 🚀`;
  
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}

function getActiveFilteredOrders() {
  const activeTab = document.querySelector('.filter-tab.active');
  const searchVal = document.getElementById('orderSearch').value.toLowerCase().trim();
  
  let result = [...storeOrders];
  
  if (activeTab) {
    const statusText = activeTab.getAttribute('onclick');
    const match = statusText.match(/filterOrders\('([^']+)'/);
    if (match && match[1] !== 'all') {
      const status = match[1];
      result = result.filter(o => o.status === status);
    }
  }
  
  if (searchVal) {
    result = result.filter(o => 
      (o.first_name && o.first_name.toLowerCase().includes(searchVal)) ||
      (o.last_name && o.last_name.toLowerCase().includes(searchVal)) ||
      (o.phone && o.phone.includes(searchVal))
    );
  }
  
  return result;
}

function escapeCSV(val) {
  if (val === null || val === undefined) return '';
  let str = String(val);
  if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function downloadCSV(filename, content) {
  const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function exportOrdersCSV(provider) {
  const activeOrders = getActiveFilteredOrders();
  if (activeOrders.length === 0) {
    showToast("No orders available to export.", "error");
    return;
  }
  
  let csvContent = "";
  if (provider === 'shipblu') {
    const headers = ["Reference ID", "Recipient Name", "Recipient Phone 1", "Recipient Phone 2", "Governorate", "City", "Address Description", "COD Amount", "Package Description", "Number of Items", "Weight (KG)", "Allow Customer to Open Package"];
    csvContent += headers.map(escapeCSV).join(",") + "\n";
    
    activeOrders.forEach(o => {
      const name = `${o.first_name || ''} ${o.last_name || ''}`.trim();
      const addressDesc = o.address ? o.address.replace(/ \| /g, ', ') : '';
      const totalAmount = o.payment_method === 'COD' ? ((Number(o.subtotal)||0) + (Number(o.shipping_cost)||0)) : 0;
      const desc = `${o.product_name || 'Shirt'} (${o.size || '—'})`;
      
      const row = [
        o.id,
        name,
        o.phone || '',
        '',
        o.city || '',
        o.city || '',
        addressDesc,
        totalAmount,
        desc,
        1,
        0.5,
        "Yes"
      ];
      csvContent += row.map(escapeCSV).join(",") + "\n";
    });
  } else if (provider === 'mylerz') {
    const headers = ["BarCode", "Reference_Number", "Consignee_Name", "Address", "Mobile_Number", "City", "Neighborhood", "Service_Type", "COD_Value", "Description", "Weight", "Special_Instructions"];
    csvContent += headers.map(escapeCSV).join(",") + "\n";
    
    activeOrders.forEach(o => {
      const name = `${o.first_name || ''} ${o.last_name || ''}`.trim();
      const addressDesc = o.address ? o.address.replace(/ \| /g, ', ') : '';
      const totalAmount = o.payment_method === 'COD' ? ((Number(o.subtotal)||0) + (Number(o.shipping_cost)||0)) : 0;
      const desc = `${o.product_name || 'Shirt'} (${o.size || '—'})`;
      
      const row = [
        '',
        o.id,
        name,
        addressDesc,
        o.phone || '',
        o.city || '',
        o.city || '',
        'Delivery',
        totalAmount,
        desc,
        0.5,
        ''
      ];
      csvContent += row.map(escapeCSV).join(",") + "\n";
    });
  }
  
  const dateStr = new Date().toISOString().split('T')[0];
  downloadCSV(`majarah_orders_${provider}_${dateStr}.csv`, csvContent);
  showToast(`Exported ${activeOrders.length} orders to ${provider.toUpperCase()} CSV!`);
}

function showPage(pageId, element) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetPage = document.getElementById(`page-${pageId}`);
  if(targetPage) targetPage.classList.add('active');
  
  if(element) {
    document.querySelectorAll('.sb-item').forEach(item => item.classList.remove('active'));
    element.classList.add('active');
  }

  // Sync mobile nav items active states
  document.querySelectorAll('.m-nav-item').forEach(item => {
    const onClickAttr = item.getAttribute('onclick');
    if (onClickAttr && onClickAttr.includes(`'${pageId}'`)) {
      document.querySelectorAll('.m-nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    }
  });
}

function showMobilePage(pageId, element) {
  showPage(pageId);
  document.querySelectorAll('.m-nav-item').forEach(item => item.classList.remove('active'));
  if (element) {
    element.classList.add('active');
  }
}

// --- PHOTO UPLOADER CONTROLS (OPTIMIZED HD: max 1200px at 85% quality JPEG) ---
function triggerFileUpload(id) {
  document.getElementById(id).click();
}

function handleFileSelect(input, targetId, previewId) {
  const file = input.files[0];
  if (!file) return;

  const targetInput = document.getElementById(targetId);
  const originalPlaceholder = targetInput.placeholder;
  
  targetInput.value = '';
  targetInput.placeholder = 'Compressing image (Optimized HD)...';
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      
      const maxDim = 1200; // Optimized HD Limit: 1200px max dimension
      if (width > maxDim || height > maxDim) {
        if (width > height) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
      }
      
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      // Compress to JPEG at 0.85 quality
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      
      targetInput.value = dataUrl;
      targetInput.placeholder = originalPlaceholder;
      updateImagePreview(targetId, previewId);
      
      showToast('Image optimized successfully!');
      input.value = ''; // Reset file input
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function updateImagePreview(inputId, previewId) {
  const val = document.getElementById(inputId).value.trim();
  const previewDiv = document.getElementById(previewId);
  if (!previewDiv) return;
  
  if (val) {
    const imgSrc = (val.startsWith('http') || val.startsWith('data:')) ? val : `./${val}`;
    previewDiv.querySelector('img').src = imgSrc;
    previewDiv.style.display = 'flex';
  } else {
    previewDiv.style.display = 'none';
  }
}

async function changeOrderStatus(id, newStatus) {
  const statusLabels = {
    confirmed: 'Confirm', shipped: 'Ship', delivered: 'Mark Delivered',
    refunded: 'Approve Refund', refund_denied: 'Reject Refund'
  };
  const verb = statusLabels[newStatus] || `Update to ${newStatus}`;
  // Use toast-based confirmation instead of browser confirm()
  const confirmed = await adminConfirm(`${verb} order #${id}?`);
  if (!confirmed) return;

  let success = false;
  if (window.SB_URL && window.SB_KEY && String(id).indexOf('ORD-') === -1) {
    const res = await sbFetch('orders', 'PATCH', { status: newStatus }, null, id);
    if (res) success = true;
  }

  const localOrders = JSON.parse(localStorage.getItem('storeOrders')) || [];
  const idx = localOrders.findIndex(o => String(o.id) === String(id));
  if (idx !== -1) {
    localOrders[idx].status = newStatus;
    localStorage.setItem('storeOrders', JSON.stringify(localOrders));
    success = true;
  }

  if (success) {
    showToast(`Order #${id} status updated to ${newStatus}`);
  } else {
    showToast(`Failed to update status for order #${id}`);
  }
  syncDashboardData();
}

async function deleteOrder(id) {
  const confirmed = await adminConfirm(`Delete order #${id}? This cannot be undone.`);
  if (!confirmed) return;
  
  let success = false;
  if (window.SB_URL && window.SB_KEY && String(id).indexOf('ORD-') === -1) {
    const res = await sbFetch('orders', 'DELETE', null, `?id=eq.${id}`);
    if (res) success = true;
  }
  
  const localOrders = JSON.parse(localStorage.getItem('storeOrders')) || [];
  const idx = localOrders.findIndex(o => String(o.id) === String(id));
  if (idx !== -1) {
    localOrders.splice(idx, 1);
    localStorage.setItem('storeOrders', JSON.stringify(localOrders));
    success = true;
  }

  if (success) {
    showToast("Order deleted successfully");
  } else {
    showToast("Failed to delete order");
  }
  syncDashboardData();
}

// Render the inventory card grid
function renderInventoryGrid() {
  const grid = document.getElementById('invGrid');
  if (!grid) return;
  
  if (storeProducts.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="e-icon">📊</div><p>No products found to manage inventory.</p></div>`;
    document.getElementById('totalStockLabel').innerText = "Total: 0 units";
    return;
  }
  
  // Calculate total stock
  const totalStock = storeInventory.reduce((sum, item) => sum + (Number(item.stock) || 0), 0);
  document.getElementById('totalStockLabel').innerText = `Total: ${totalStock} units`;
  
  grid.innerHTML = storeProducts.map(p => {
    // Get stock values for sizes
    const getStock = (size) => {
      const item = storeInventory.find(i => Number(i.product_id) === p.id && i.size === size);
      return item ? item.stock : 0;
    };
    
    return `
      <div class="inv-card">
        <div class="inv-card-top">
          <div class="inv-card-title">${p.name}</div>
          <div style="font-size:11px;color:var(--muted);">${p.color || ''}</div>
        </div>
        <div class="inv-card-body">
          <div class="size-inv-row">
            <span class="size-lbl">S</span>
            <input type="number" class="size-stock-input" data-product-id="${p.id}" data-size="S" value="${getStock('S')}" min="0">
          </div>
          <div class="size-inv-row">
            <span class="size-lbl">M</span>
            <input type="number" class="size-stock-input" data-product-id="${p.id}" data-size="M" value="${getStock('M')}" min="0">
          </div>
          <div class="size-inv-row">
            <span class="size-lbl">L</span>
            <input type="number" class="size-stock-input" data-product-id="${p.id}" data-size="L" value="${getStock('L')}" min="0">
          </div>
          <div class="size-inv-row">
            <span class="size-lbl">XL</span>
            <input type="number" class="size-stock-input" data-product-id="${p.id}" data-size="XL" value="${getStock('XL')}" min="0">
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Save all inventory values in parallel
async function saveInventory() {
  const inputs = document.querySelectorAll('.size-stock-input');
  const promises = [];
  
  showToast("Saving inventory...");
  
  for (let input of inputs) {
    const productId = Number(input.getAttribute('data-product-id'));
    const size = input.getAttribute('data-size');
    const stock = Number(input.value) || 0;
    
    const existing = storeInventory.find(i => Number(i.product_id) === productId && i.size === size);
    
    if (existing) {
      promises.push(sbFetch('inventory', 'PATCH', { stock }, null, existing.id));
    } else {
      promises.push(sbFetch('inventory', 'POST', { product_id: productId, size, stock }));
    }
  }
  
  try {
    await Promise.all(promises);
    showToast("Inventory saved successfully!");
  } catch (err) {
    console.error("Error saving inventory:", err);
    showToast("Failed to save some inventory items.");
  }
  syncDashboardData();
}

  const subtotal = Number(document.getElementById('oSubtotal').value) || 0;

  const status = document.getElementById('oStatus').value;

  if (!first_name || !last_name || !phone || !address) {

  const newOrder = {

    phone,
    email,
    city,
    address,
    product_name,
    size,
    payment_method,
    subtotal,
    shipping_cost,
    status,
    notes
  };

  const res = await sbFetch('orders', 'POST', newOrder);
  if (res) {

let salesTrendChartInstance = null;
let sizePopularityChartInstance = null;

function renderAnalyticsCharts(orders) {
  if (typeof Chart === 'undefined') return;

  const activeOrders = orders.filter(o => o.status !== 'cancelled');

  const salesMap = {};
  const today = new Date();
  
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    salesMap[dateStr] = 0;
  }
  
  activeOrders.forEach(o => {
    let dateStr = null;
    if (o.created_at) {
      dateStr = o.created_at.split('T')[0];
    } else if (o.date) {
      const parts = o.date.split(' ')[0].split('/');
      if (parts.length === 3) {
        const mm = String(parts[0]).padStart(2, '0');
        const dd = String(parts[1]).padStart(2, '0');
        const yyyy = parts[2];
        dateStr = `${yyyy}-${mm}-${dd}`;
      }
    }
    if (dateStr && salesMap[dateStr] !== undefined) {
      salesMap[dateStr] += (Number(o.subtotal) || 0);
    }
  });

  const salesLabels = Object.keys(salesMap).map(d => {
    const parts = d.split('-');
    return `${parts[1]}/${parts[2]}`;
  });
  const salesData = Object.values(salesMap);

  const sizeMap = { 'S': 0, 'M': 0, 'L': 0, 'XL': 0 };
  activeOrders.forEach(o => {
    const sz = String(o.size).toUpperCase().trim();
    if (sizeMap[sz] !== undefined) {
      sizeMap[sz]++;
    }
  });
  const sizeLabels = Object.keys(sizeMap);
  const sizeData = Object.values(sizeMap);

  const salesCtx = document.getElementById('salesTrendChart');
  if (salesCtx) {
    if (salesTrendChartInstance) {
      salesTrendChartInstance.destroy();
    }
    salesTrendChartInstance = new Chart(salesCtx, {
      type: 'line',
      data: {
        labels: salesLabels,
        datasets: [{
          label: 'Revenue (EGP)',
          data: salesData,
          borderColor: '#c8ff00',
          backgroundColor: 'rgba(200, 255, 0, 0.05)',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#555', font: { size: 9, family: 'DM Mono' } }
          },
          y: {
            grid: { color: '#151515' },
            ticks: { color: '#555', font: { size: 9, family: 'DM Mono' } }
          }
        }
      }
    });
  }

  const sizeCtx = document.getElementById('sizePopularityChart');
  if (sizeCtx) {
    if (sizePopularityChartInstance) {
      sizePopularityChartInstance.destroy();
    }
    sizePopularityChartInstance = new Chart(sizeCtx, {
      type: 'bar',
      data: {
        labels: sizeLabels,
        datasets: [{
          data: sizeData,
          backgroundColor: ['rgba(255,255,255,0.08)', 'rgba(200, 255, 0, 0.4)', 'rgba(255,255,255,0.2)', 'rgba(255,255,255,0.1)'],
          borderColor: ['rgba(255,255,255,0.2)', '#c8ff00', 'rgba(255,255,255,0.4)', 'rgba(255,255,255,0.2)'],
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#777', font: { size: 10, family: 'Syne', weight: 'bold' } }
          },
          y: {
            grid: { color: '#151515' },
            ticks: { color: '#555', font: { size: 9, family: 'DM Mono' }, precision: 0 }
          }
        }
      }
    });
  }
}

function adminConfirm(message) {
  return new Promise(resolve => {
    // Create a minimal inline confirm toast
    const existing = document.getElementById('adminConfirmToast');
    if (existing) existing.remove();

    const el = document.createElement('div');
    el.id = 'adminConfirmToast';
    el.style.cssText = `
      position:fixed;bottom:28px;right:28px;z-index:99999;
      background:var(--surface);border:1px solid var(--border2);
      border-radius:var(--radius);padding:16px 20px;
      font-size:12px;color:var(--text);letter-spacing:.5px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      animation:fadeIn .2s ease; max-width:320px;
    `;
    el.innerHTML = `
      <div style="margin-bottom:12px;line-height:1.6;">${message}</div>
      <div style="display:flex;gap:10px;">
        <button id="acConfirm" style="flex:1;padding:8px;background:var(--accent);color:#080808;border:none;border-radius:var(--radius);font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;">Confirm</button>
        <button id="acCancel"  style="flex:1;padding:8px;background:var(--surface2);color:var(--muted);border:1px solid var(--border2);border-radius:var(--radius);font-family:var(--font-display);font-size:11px;cursor:pointer;">Cancel</button>
      </div>
    `;
    document.body.appendChild(el);

    el.querySelector('#acConfirm').onclick = () => { el.remove(); resolve(true);  };
    el.querySelector('#acCancel').onclick  = () => { el.remove(); resolve(false); };
  });
}

// --- PROMOTION STATISTICS & TWEAKS HANDLERS ---
function updatePromoPreviewStats() {
  const text = localStorage.getItem('mjr_promo_text') || '🔥 MAJARAH DROP 01 OUT NOW · FAST HOME DELIVERY ALL OVER EGYPT 🔥';
  const previewEl = document.getElementById('tweakPromoPreview');
  const wordCountEl = document.getElementById('tweakPromoWordCount');
  const charCountEl = document.getElementById('tweakPromoCharCount');
  
  if (previewEl) previewEl.innerText = text;
  
  const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
  if (wordCountEl) wordCountEl.innerText = `${words} words`;
  if (charCountEl) charCountEl.innerText = `${text.length} characters`;
}

async function saveTweaks() {
  const text = document.getElementById('promoTextSetting').value.trim();
  const speed = document.getElementById('tweakPromoSpeed').value.trim();
  const repeats = document.getElementById('tweakPromoRepeats').value.trim();
  const showMarquee = document.getElementById('tweakShowMarquee').value;
  const showSignIn = document.getElementById('tweakShowSignIn').value;
  const showStars = document.getElementById('tweakShowStars').value;
  const showSizeCalc = document.getElementById('tweakShowSizeCalc').value;
  const showInstagram = document.getElementById('tweakShowInstagram').value;
  const showTiktok = document.getElementById('tweakShowTiktok').value;
  const showCoupons = document.getElementById('tweakShowCoupons').value;
  const couponCodes = document.getElementById('tweakCouponCodes').value.trim();
  const showCOD = document.getElementById('tweakShowCOD') ? document.getElementById('tweakShowCOD').value : 'true';
  const showApplePay = document.getElementById('tweakShowApplePay') ? document.getElementById('tweakShowApplePay').value : 'true';
  const showCard = document.getElementById('tweakShowCard') ? document.getElementById('tweakShowCard').value : 'true';
  
  // Pre-launch mode values
  const showPrelaunch = document.getElementById('tweakShowPrelaunch') ? document.getElementById('tweakShowPrelaunch').value : 'false';
  const prelaunchDate = document.getElementById('tweakPrelaunchDate') ? document.getElementById('tweakPrelaunchDate').value.trim() : '2026-07-01T20:00:00';
  const prelaunchPassword = document.getElementById('tweakPrelaunchPassword') ? document.getElementById('tweakPrelaunchPassword').value.trim() : 'majarah2026';
  
  if (!text || !speed || !repeats) {
    showToast("Please fill all promotion marquee configuration fields!", "error");
    return;
  }
  
  // Set in localStorage cache
  localStorage.setItem('mjr_promo_text', text);
  localStorage.setItem('mjr_promo_speed', speed);
  localStorage.setItem('mjr_promo_repeats', repeats);
  localStorage.setItem('mjr_show_marquee', showMarquee);
  localStorage.setItem('mjr_show_signin', showSignIn);
  localStorage.setItem('mjr_show_stars', showStars);
  localStorage.setItem('mjr_show_size_calc', showSizeCalc);
  localStorage.setItem('mjr_show_instagram', showInstagram);
  localStorage.setItem('mjr_show_tiktok', showTiktok);
  localStorage.setItem('mjr_show_coupons', showCoupons);
  localStorage.setItem('mjr_coupon_codes', couponCodes);
  localStorage.setItem('mjr_show_cod', showCOD);
  localStorage.setItem('mjr_show_apple_pay', showApplePay);
  localStorage.setItem('mjr_show_card', showCard);
  
  // Pre-launch mode set in cache
  localStorage.setItem('mjr_show_prelaunch', showPrelaunch);
  localStorage.setItem('mjr_prelaunch_date', prelaunchDate);
  localStorage.setItem('mjr_prelaunch_password', prelaunchPassword);
  
  const settingsList = [
    { key: 'promo_text', value: text },
    { key: 'promo_speed', value: speed },
    { key: 'promo_repeats', value: repeats },
    { key: 'show_marquee', value: showMarquee },
    { key: 'show_signin', value: showSignIn },
    { key: 'show_stars', value: showStars },
    { key: 'show_size_calc', value: showSizeCalc },
    { key: 'show_instagram', value: showInstagram },
    { key: 'show_tiktok', value: showTiktok },
    { key: 'show_coupons', value: showCoupons },
    { key: 'coupon_codes', value: couponCodes },
    { key: 'show_cod', value: showCOD },
    { key: 'show_apple_pay', value: showApplePay },
    { key: 'show_card', value: showCard },
    { key: 'show_prelaunch', value: showPrelaunch },
    { key: 'prelaunch_date', value: prelaunchDate },
    { key: 'prelaunch_password', value: prelaunchPassword }
  ];
  
  let successCount = 0;
  
  if (SB_URL && SB_KEY) {
    try {
      const baseUrl = SB_URL.replace(/\/+$/, "");
      
      for (const item of settingsList) {
        // Try PATCH first
        const patchRes = await fetch(`${baseUrl}/rest/v1/settings?key=eq.${item.key}`, {
          method: 'PATCH',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({ value: item.value })
        });
        
        let saved = false;
        if (patchRes.ok) {
          const patchData = await patchRes.json();
          if (patchData && patchData.length > 0) {
            saved = true;
          }
        }
        
        if (!saved) {
          // POST if key doesn't exist
          const postRes = await fetch(`${baseUrl}/rest/v1/settings`, {
            method: 'POST',
            headers: {
              'apikey': SB_KEY,
              'Authorization': `Bearer ${SB_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ key: item.key, value: item.value })
          });
          if (postRes.ok) saved = true;
        }
        
        if (saved) successCount++;
      }
    } catch(e) {
      console.error("Database settings saving failed:", e);
    }
  }
  
  if (SB_URL && SB_KEY && successCount === settingsList.length) {
    showToast("Configurations saved and synced to database!");
  } else {
    showToast("Configurations saved locally!");
  }
  
  updatePromoPreviewStats();
}

function exportPrelaunchEmailsCSV() {
  const emailsText = document.getElementById('tweakPrelaunchEmails').value.trim();
  if (!emailsText) {
    showToast("No emails available to export!", "error");
    return;
  }
  const emails = emailsText.split('\n').filter(e => e.trim().length > 0);
  let csvContent = "data:text/csv;charset=utf-8,Email\n" + emails.join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", "majarah_prelaunch_emails.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast("CSV Exported successfully!", "success");
}

async function clearPrelaunchEmails() {
  if (!confirm("Are you sure you want to permanently clear the pre-launch registered email list? This action cannot be undone.")) {
    return;
  }
  
  localStorage.setItem('mjr_prelaunch_emails', '[]');
  const textarea = document.getElementById('tweakPrelaunchEmails');
  if (textarea) textarea.value = '';
  
  if (SB_URL && SB_KEY) {
    try {
      const baseUrl = SB_URL.replace(/\/+$/, "");
      const res = await fetch(`${baseUrl}/rest/v1/settings?key=eq.prelaunch_emails`, {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY,
          'Authorization': `Bearer ${SB_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ value: '[]' })
      });
      if (res.ok) {
        showToast("Pre-launch email list cleared in database!", "success");
      } else {
        showToast("Cleared locally, but database failed to update.", "warning");
      }
    } catch(e) {
      console.error(e);
      showToast("Cleared locally, but failed to connect to database.", "warning");
    }
  } else {
    showToast("Cleared locally. Supabase connection not configured.", "warning");
  }
}

// MOBILE PREVIEW SIMULATOR CONTROLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentSimPage = '../index.html';
let currentSimOrientation = 'portrait';
let currentSimDevice = 'iphone12';

function openMobileSimulator(pageName) {
  currentSimPage = pageName || '../index.html';
  document.getElementById('simulatorModal').classList.add('open');
  
  // Set active buttons
  updateSimulatorControlsUI();
  
  // Load iframe src
  const iframe = document.getElementById('simIframe');
  iframe.src = `./${currentSimPage}`;
  
  // Update live clock
  updateSimulatorClock();
  
  // Update active select value
  document.getElementById('simDeviceSelect').value = currentSimDevice;
  
  // Initial frame dimensions
  applySimulatorDimensions();
}

function updateSimulatorClock() {
  const timeEl = document.getElementById('simTime');
  if (!timeEl) return;
  const now = new Date();
  const hr = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  timeEl.textContent = `${hr}:${min}`;
}

function switchSimulatorPage(pageName) {
  currentSimPage = pageName;
  const iframe = document.getElementById('simIframe');
  iframe.src = `./${currentSimPage}`;
  updateSimulatorControlsUI();
}

function setSimulatorOrientation(orient) {
  currentSimOrientation = orient;
  const wrapper = document.getElementById('simPhoneWrapper');
  
  if (orient === 'landscape') {
    wrapper.classList.add('landscape');
  } else {
    wrapper.classList.remove('landscape');
  }
  
  applySimulatorDimensions();
  updateSimulatorControlsUI();
}

function setSimulatorDevice(device) {
  currentSimDevice = device;
  applySimulatorDimensions();
}

function applySimulatorDimensions() {
  const wrapper = document.getElementById('simPhoneWrapper');
  const isLandscape = currentSimOrientation === 'landscape';
  
  let w = 390;
  let h = 680;
  
  if (currentSimDevice === 'small') {
    w = 360;
    h = 600;
  } else if (currentSimDevice === 'tablet') {
    w = 768;
    h = 900;
  }
  
  if (isLandscape) {
    wrapper.style.width = `${h}px`;
    wrapper.style.height = `${w}px`;
  } else {
    wrapper.style.width = `${w}px`;
    wrapper.style.height = `${h}px`;
  }
}

function reloadSimulatorFrame() {
  const iframe = document.getElementById('simIframe');
  iframe.contentWindow.location.reload();
}

function updateSimulatorControlsUI() {
  // Page buttons
  document.getElementById('simPageStorefront').classList.toggle('sim-btn-active', currentSimPage === '../index.html');
  document.getElementById('simPageAdmin').classList.toggle('sim-btn-active', currentSimPage === './index.html');
  
  // Orientation buttons
  document.getElementById('simOrientPortrait').classList.toggle('sim-btn-active', currentSimOrientation === 'portrait');
  document.getElementById('simOrientLandscape').classList.toggle('sim-btn-active', currentSimOrientation === 'landscape');
}

// Initialise clock updater
setInterval(updateSimulatorClock, 30000);
