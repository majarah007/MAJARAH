<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAJARAH · Admin</title>
  <link rel="icon" type="image/png" id="adminIcon" href="../admin_favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Majarah · مَجَرَّة</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-subtitle">Drop 01 · Secure Access</div>
    <input type="email" id="loginUser" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="login-btn" onclick="doLogin()">Enter Dashboard</button>
    <div class="login-err" id="loginErr">Invalid credentials. Try again.</div>
  </div>
</div>

<div id="toast"></div>

<div id="app"></div>

<!-- Live Mobile Preview Simulator Modal -->
<div class="modal-overlay" id="simulatorModal">
  <div class="modal" style="max-width: 850px; padding: 24px; background: var(--bg);">
    <button class="modal-x" onclick="closeModal('simulatorModal')">✕</button>
    <h2 id="simulatorTitle">Mobile Preview Simulator</h2>
    <div class="modal-sub">Simulate screen viewport sizes and orientations</div>
    
    <!-- Control Header -->
    <div class="sim-controls">
      <div class="sim-control-group">
        <label>Page:</label>
        <button class="btn btn-sm btn-ghost sim-btn-active" id="simPageStorefront" onclick="switchSimulatorPage('../index.html')">Storefront (index.html)</button>
        <button class="btn btn-sm btn-ghost" id="simPageAdmin" onclick="switchSimulatorPage('./index.html')">Admin Panel (admin)</button>
      </div>
      
      <div class="sim-control-group">
        <label>Orientation:</label>
        <button class="btn btn-sm btn-ghost sim-btn-active" id="simOrientPortrait" onclick="setSimulatorOrientation('portrait')">📱 Portrait</button>
        <button class="btn btn-sm btn-ghost" id="simOrientLandscape" onclick="setSimulatorOrientation('landscape')">🔄 Landscape</button>
      </div>
      
      <div class="sim-control-group">
        <label>Device Size:</label>
        <select id="simDeviceSelect" onchange="setSimulatorDevice(this.value)" class="search-bar" style="width: auto; padding: 6px 12px; font-size: 11px;">
          <option value="iphone12">Medium Phone (390px)</option>
          <option value="small">Small Phone (360px)</option>
          <option value="tablet">Tablet (768px)</option>
        </select>
      </div>

      <div class="sim-control-group">
        <button class="btn btn-sm btn-ghost" onclick="reloadSimulatorFrame()" style="padding: 6px 10px; font-size:11px;">🔄 Reload</button>
      </div>
    </div>
    
    <!-- Phone Mockup Container -->
    <div class="sim-phone-wrapper" id="simPhoneWrapper">
      <div class="sim-speaker"></div>
      <div class="sim-status-bar">
        <span id="simTime">09:41</span>
        <span style="display:flex; gap: 4px; align-items:center;">
          <span>📶</span>
          <span>🔋 100%</span>
        </span>
      </div>
      <iframe class="sim-iframe" id="simIframe" src=""></iframe>
    </div>
    
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
